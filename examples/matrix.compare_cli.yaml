run_id: repogauge-cli-compare
dataset:
  path: ../out/eval/dataset.resolved.jsonl
providers:
  codex:
    kind: codex_cli
    command: codex
  claude:
    kind: claude_cli
    command: claude
  opencode:
    kind: opencode_cli
    command: opencode
execution:
  repeats: 1
  seed: 13
solvers:
  - id: codex-cli-mini
    provider: codex
    adapter: codex_cli
    model: gpt-5.4-mini
    timeout_seconds: 300
    prompt_policy:
      template: concise
    tool_policy:
      safe: true
  - id: claude-cli-sonnet
    provider: claude
    adapter: claude_cli
    model: claude-sonnet-4-6
    timeout_seconds: 300
    prompt_policy:
      template: concise
    tool_policy:
      safe: true
  - id: opencode-kimi-k2p5
    provider: opencode
    adapter: opencode_cli
    model: fireworks-ai/accounts/fireworks/models/kimi-k2p5
    agent: build
    timeout_seconds: 300
    prompt_policy:
      template: concise
    tool_policy:
      safe: true
