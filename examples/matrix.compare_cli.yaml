run_id: repogauge-cli-compare
dataset:
  path: ../out/eval/dataset.resolved.jsonl
providers:
  claude:
    kind: claude_cli
    command: claude
execution:
  repeats: 1
  seed: 13
solvers:
  - id: claude-cli-sonnet
    provider: claude
    adapter: claude_cli
    model: claude-sonnet-4-6
    timeout_seconds: 300
    prompt_policy:
      template: concise
    tool_policy:
      safe: true
