name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --group dev --frozen
      - name: Run unit tests
        run: uv run python -m pytest tests/unit -q
  e2e:
    name: E2E smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --group dev --frozen
      - name: Run e2e self-gauge test
        run: uv run python -m pytest tests/e2e/test_self_gauge.py -q
